name: Build & Package

# ─── Triggers ────────────────────────────────────────────────────────────────
on:
  push:
    branches: [ main ]
    tags:     [ 'v*.*.*' ]       # e.g. v1.0.0 → creates a GitHub Release
  pull_request:
    branches: [ main ]
  workflow_dispatch:              # allow manual runs from the Actions tab

# ─── Job ─────────────────────────────────────────────────────────────────────
jobs:
  build:
    name: Build WPF App (win-x64)
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. .NET 8 SDK ────────────────────────────────────────────────────
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      # ── 3. Restore NuGet packages ────────────────────────────────────────
      - name: Restore
        run: dotnet restore VideoCompressorUI/VideoCompressorUI.csproj

      # ── 4. Publish (Release · win-x64 · single-file) ────────────────────
      - name: Publish
        run: >-
          dotnet publish VideoCompressorUI/VideoCompressorUI.csproj
          -c Release
          -o ./publish
          --no-restore

      # ── 5. Add a README so users know the runtime requirement ────────────
      - name: Write distribution README
        shell: pwsh
        run: |
          @"
          Video Compressor
          ================
          Requires:
            .NET 8 Desktop Runtime (x64)
            Download: https://aka.ms/dotnet/8.0/windowsdesktop-runtime-win-x64.exe

          FFmpeg is downloaded automatically on first use (~70 MB, one-time).
          It is stored in:  <app folder>\ffmpeg\

          Usage:
            Run VideoCompressorUI.exe
            Drop a video file onto the window, or click Browse.
          "@ | Set-Content ./publish/README.txt

      # ── 6. Resolve version / artifact name ──────────────────────────────
      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -match '^refs/tags/(.+)$') {
            $v = $Matches[1]
          } else {
            $v = "dev-$($env:GITHUB_SHA.Substring(0,7))"
          }
          echo "version=$v"                       >> $env:GITHUB_OUTPUT
          echo "artifact=VideoCompressor-$v"      >> $env:GITHUB_OUTPUT
          echo "zip=VideoCompressor-$v.zip"       >> $env:GITHUB_OUTPUT

      # ── 7. Zip ───────────────────────────────────────────────────────────
      - name: Zip
        shell: pwsh
        run: Compress-Archive -Path ./publish/* -DestinationPath "${{ steps.ver.outputs.zip }}"

      # ── 8. Upload build artifact (always) ────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.ver.outputs.artifact }}
          path: ${{ steps.ver.outputs.zip }}
          retention-days: 30

      # ── 9. Create GitHub Release (only on version tags) ──────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.ver.outputs.version }}
          tag_name: ${{ steps.ver.outputs.version }}
          files: ${{ steps.ver.outputs.zip }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.ver.outputs.version, '-') }}
